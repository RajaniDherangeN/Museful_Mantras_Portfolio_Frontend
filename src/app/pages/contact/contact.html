<section class="contact_form">
  
  <!-- Left Side: Contact Info -->
  <div class="socials_1">
    <h1>Get In Touch</h1>

    <div class="contact-email">
      <h2>Email</h2>
      <a href="mailto:museful333@gmail.com" class="email-link" aria-label="Send email to museful333">
        museful333@gmail.com
      </a>
    </div>

    <div class="social-icons">
      <h2>Socials</h2>

      <a href="https://www.instagram.com/museful333/" target="_blank" rel="noopener noreferrer" class="social-link">
        <img src="assets/image/icons8-instagram-100.png" alt="Instagram" />
        <span>museful333</span>
      </a>

      <a href="https://www.youtube.com/@MusefulMantras" target="_blank" rel="noopener noreferrer" class="social-link">
        <img src="assets/image/icons8-youtube-100.png" alt="YouTube" />
        <span>Museful Mantras</span>
      </a>

      <a href="https://in.pinterest.com/musefulm/" target="_blank" rel="noopener noreferrer" class="social-link">
        <img src="assets/image/icons8-pinterest-100.png" alt="Pinterest" />
        <span>musefulm</span>
      </a>
    </div>
  </div>

  <!-- Right Side: Contact Form -->
  <div class="socials_2">
    <h2>Send a Message</h2>

    <div class="name-group">
      <div class="input-field">
        <label for="first_name">First Name</label>
        <input type="text" id="first_name" name="first_name" placeholder="John" required />
      </div>
      <div class="input-field">
        <label for="last_name">Last Name</label>
        <input type="text" id="last_name" name="last_name" placeholder="Doe" required />
      </div>
    </div>

    <div class="input-field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="john@example.com" required />
    </div>

    <div class="input-field">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
    </div>

    <button type="submit" class="submit-btn">Send Message</button>
  </div>

</section>
